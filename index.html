<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🚀 Asteroids</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
      overflow: hidden;
    }
    #hud {
      display: flex;
      gap: 40px;
      margin-bottom: 10px;
      font-size: 18px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #0ff;
    }
    canvas {
      border: 1px solid #0ff4;
      box-shadow: 0 0 30px #0ff3, 0 0 60px #0ff1;
    }
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: #0ff;
      text-align: center;
      pointer-events: none;
    }
    #overlay h1 { font-size: 64px; letter-spacing: 8px; text-shadow: 0 0 20px #0ff; }
    #overlay p  { font-size: 20px; letter-spacing: 3px; color: #aef; }
    #overlay small { font-size: 13px; color: #468; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div id="hud">
    <span>Score: <span id="score">0</span></span>
    <span>Lives: <span id="lives">3</span></span>
    <span>Level: <span id="level">1</span></span>
  </div>
  <canvas id="c"></canvas>
  <div id="overlay">
    <h1>ASTEROIDS</h1>
    <p>Press <b>ENTER</b> or tap to start</p>
    <small>WASD / Arrows · Space to shoot · Double-tap for thrust</small>
  </div>
  <script src="game.js"></script>
</body>
</html>
